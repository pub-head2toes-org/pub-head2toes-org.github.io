<script>

        document.getElementById('fileinput').addEventListener('change', function(){
            var file = this.files[0];
            console.log("name : " + file.name);
            console.log("size : " + file.size);
            console.log("type : " + file.type);
            console.log("date : " + file.lastModified);
    
            var reader = new FileReader();
    
            reader.onload = function(e) {
            var text = reader.result;
            var keys = text.split(".");
            localStorage.pub = keys[0];
            localStorage.priv = keys[1];
    
            keyspub = new sjcl.ecc.ecdsa.publicKey(
                sjcl.ecc.curves.c256,
                sjcl.codec.base64.toBits(localStorage.pub)
            );
            keyssec = new sjcl.ecc.ecdsa.secretKey(
                sjcl.ecc.curves.c256,
                sjcl.ecc.curves.c256.field.fromBits(sjcl.codec.base64.toBits(localStorage.priv))
            );
            var ssId = 
            localStorage.pub +
                "." + 
                (new Date().getTime());
            
            var sig = keyssec.sign(sjcl.hash.sha256.hash(ssId))
            var sigb64 = sjcl.codec.base64.fromBits(sig);
    
            setCookie ('ssid', ssId + "." + sigb64, 1);

            }
    
            reader.readAsText(file);
    
        }, false);
    
    </script>
