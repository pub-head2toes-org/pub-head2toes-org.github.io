    <tspan>12</tspan></text>
    -->
</svg>

<script>
    var selectedElement, offset;
    var fill = "url(#rg2)";

        function makeDraggable(evt) {
            var svg = evt.target;
            svg.addEventListener('mousedown', startDrag);
            svg.addEventListener('mousemove', drag);
            svg.addEventListener('mouseup', endDrag);
            svg.addEventListener('mouseleave', endDrag);

            function getMousePosition(evt) {
                var CTM = svg.getScreenCTM();
                return {
                    x: (evt.clientX - CTM.e) / CTM.a,
                    y: (evt.clientY - CTM.f) / CTM.d
                };
            }
            function startDrag(evt) {
                if (evt.target.classList.contains('draggable')) {
                    selectedElement = evt.target;
                    offset = getMousePosition(evt);
                    offset.x -= parseFloat(selectedElement.getAttributeNS(null, "cx"));
                    offset.y -= parseFloat(selectedElement.getAttributeNS(null, "cy"));
                }
            }
            function drag(evt) {
                if (selectedElement) {
                    evt.preventDefault();
                    var coord = getMousePosition(evt);
                    selectedElement.setAttributeNS(null, "cx", coord.x - offset.x);
                    selectedElement.setAttributeNS(null, "cy", coord.y - offset.y);
                }
            }
            function endDrag(evt) {
                if (!selectedElement){
                    return;
                }
                selectedElement = null;
                // var newElement = document.createElementNS("http://www.w3.org/2000/svg", 'path'); //Create a path in SVG's namespace
                // newElement.setAttribute("d","M 0 0 L 10 10"); //Set path's data
                // newElement.style.stroke = "#000"; //Set stroke colour
                // newElement.style.strokeWidth = "5px"; //Set stroke width
                // svg.appendChild(newElement);
                var newElement = document.createElementNS("http://www.w3.org/2000/svg", 'circle'); //Create a path in SVG's namespace
                //fill="url(#rg2)" r="2" cx="100" cy="15"
                newElement.setAttribute("class","draggable");
                if (fill === "url(#rg2)"){
                    fill = "url(#rg)";
                } else {
                    fill = "url(#rg2)";
                }
                newElement.setAttribute("fill",fill);
                newElement.setAttribute("r","2");
                newElement.setAttribute("cx","100");
                newElement.setAttribute("cy","15");

                svg.appendChild(newElement);

            }
        }
</script>

<style>
.draggable {
  cursor: move;
}
</style>
