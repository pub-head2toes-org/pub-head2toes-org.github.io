<!DOCTYPE html>
<html>
<head>
    <title>Text Editor</title>
    <style>

body {
    font-family: sans-serif;
    color: #0b0;
    background-color: #111;
  }
 
        textarea {
          color: #0f0;
          background-color: #111;
            width: 100%;
            height: 200px;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            margin: 5px;
            background-color: #0b0;
        }
    </style>
</head>
<body>

    <h1>Text Editor</h1>

    <div>
        <textarea id="mainText" placeholder="Enter main text here"></textarea>
    </div>

    <div>
        <textarea id="lineText" placeholder="Copied line text"></textarea>
    </div>

    <div>
        <button onclick="moveCursorUp()">Up</button>
        <button onclick="moveCursorDown()">Down</button>
    </div>

    <script>

function getLine(textarea){
  let line = textarea.value.substr(0, textarea.selectionStart).split("\n").length-1
  return line
}


function getLineText(clip){
  let line = getLine(clip)
  let lines = clip.value.split("\n")
  return lines[line]
}

function getLinePos(lines){
  let res = 0
  for (let i=0; i<lineNum-1; i++){
    res = res + lines[i].length
  }
  return res
}

function select(){

            const lines = mainTextArea.value.split('\n')
            const linePos = getLinePos(lines)+lineNum

            mainTextArea.selectionStart = linePos-1
            mainTextArea.selectionEnd = linePos + (lines[lineNum-1]).length
}

function scroll(dir){
  const scrollH = mainTextArea.scrollHeight
  const linesCount = mainTextArea.value.split('\n').length
  const cfnt = lineNum/linesCount
  var lineHeight = scrollH/linesCount //mainTextArea.clientHeight / mainTextArea.rows;

  //mainTextArea.scrollTop = lineHeight * (lineNum - 1) - mainTextArea.clientHeight/2;
  mainTextArea.scrollTop = mainTextArea.scrollTop + dir*lineHeight
}

        const mainTextArea = document.getElementById('mainText');
        const lineTextArea = document.getElementById('lineText');
        const upButton = document.querySelector('button[onclick="moveCursorUp()"]');
        const downButton = document.querySelector('button[onclick="moveCursorDown()"]');

        let lineNum = 1;

        mainTextArea.addEventListener('click', function(event) {
            // Calculate line number
            const lines = mainTextArea.value.split('\n')
            lineNum = getLine(mainTextArea) + 1
            lineTextArea.value = lines[lineNum - 1];
            select();
        });

        upButton.addEventListener('click', function() {
            lineNum = Math.max(1, lineNum - 1);
            lineTextArea.value = mainTextArea.value.split('\n')[lineNum - 1];
            mainTextArea.focus();
            select()
            scroll(-1)
        });

        downButton.addEventListener('click', function() {
            lineNum = Math.min(mainTextArea.value.split('\n').length, lineNum + 1);
            lineTextArea.value = mainTextArea.value.split('\n')[lineNum - 1];
            mainTextArea.focus();
            select()
            scroll(1)
        });

        // Event listener for changes in the line textarea
        lineTextArea.addEventListener('input', function() {
            const text = lineTextArea.value;
            const lines = mainTextArea.value.split('\n');
            if (lines.length > 0 && lines.length >= lineNum) {
                lines[lineNum - 1] = text;
                mainTextArea.value = lines.join('\n');
            }
        });
    </script>

</body>
</html>
