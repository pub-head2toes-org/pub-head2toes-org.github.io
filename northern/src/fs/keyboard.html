<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>Keyboard</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/cli_v2.js"></script>
  <script src="js/keyboard.js"></script>
<script src="js/keyboard-helper.js"></script>
<script src="js/beautify.js"></script>

<style>
body{
  background: #222;
}
textarea{
  background: #222;
  color: #07ae07;
  font-size: 1em;
  font-family:Consolas,Monaco,Lucida Console,Liberation Mono,DejaVu Sans Mono,Bitstream Vera Sans Mono,Courier New, monospace;
}
</style>

<body onload="onBodyLoad();">

<div class="cards">
<section class="card">
  <div>
  <textarea style="width:100%;" id="clip" rows="5" onfocus="initFocus(this)"></textarea>
  </div>
  <div id="footer">
    [Ok]
  </div>
</section>
<section id="keyboard" class="card">
</section>
</div>
<section>
  <div>
  <textarea style="width:100%;" id="text" rows="15" onfocus="initFocus(this)"></textarea>
  </div>
  <div>
  <textarea style="width:100%;" id="text2" rows="15" onfocus="initFocus(this)"></textarea>
  </div>
</section>
</body>
</html>
