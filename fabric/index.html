<!DOCTYPE html>
<html lang="en" ng-app="kitchensink">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#005E7A">
    <link rel="manifest" href="./manifest.json">

    <title>Notebook drawing | Powered by: Fabric.js</title>

    <style>
      pre { margin-left: 15px !important }
    </style>
    <script src="./lib/prism.js"></script>
    <script src="./fabric.js"></script>
  </head>
  <body>
    

    <div id="bd-wrapper" ng-controller="CanvasControls">
      
      <style>
#drawing-mode {
  margin-bottom: 10px;
  vertical-align: top;
}
#drawing-mode-options {
  display: inline-block;
  vertical-align: top;
  margin-bottom: 10px;
  margin-top: 10px;
  background: #f5f2f0;
  padding: 10px;
}
label {
  display: inline-block; width: 130px;
}
.info {
  display: inline-block;
  width: 25px;
  background: #ffc;
}
#bd-wrapper {
  min-width: 810px;
}
.btn {
	padding: 10px;
}
a {
	padding: 10px;
}
</style>

<div style="float:left;">
<canvas id="c" width="512" height="512" style="border:1px solid #aaa; width:100%"></canvas>
</div>

<div style="">
<div style="display: inline-block; margin-left: 10px">
  
	<div style="padding:10px;">
	<span style="padding:10px;">
		<button id="clear-canvas" class="btn btn-info">Clear</button>
		<button id="drawing-mode" class="btn btn-info">Cancel drawing mode</button>
		<input type="text" id="textblob">
		<button id="add-text" class="btn btn-info">Add text</button>
	</span>
		<br>
		<label for="fileinput" class="button">
                                    Load Img
                        </label>
        	<input class="button-hidden" type="file" id="fileinput" />
		<br>
		<label for="jsoninput" class="button">
                                    Load JSON
                        </label>
        	<input class="button-hidden" type="file" id="jsoninput" />

	</div>
<div>
<span style="margin:10px; padding:10px;">
  <button id="copy-el" class="btn btn-info">Copy</button>
  <button id="paste-el" class="btn btn-info">Paste</button>
  <button id="remove-el" class="btn btn-info">Remove</button>
</span>

<div style="padding:10px">
<span style="margin:10px; padding:10px;">
  <a href="#" id="down-png" onclick="javascript:saveCanvas()" download="draw.png">Download PNG</a>
  <a href="#" id="down-json" onclick="javascript:saveCanvasJson()" download="draw.json">Download JSON</a>
</span>
</div>
<div>
<span style="margin:10px; padding:10px;">
</div>
  <div id="drawing-mode-options">
    
    <label for="drawing-mode-selector">Mode:</label>
    <select id="drawing-mode-selector">
      <option>Pencil</option>
      <option>Circle</option>
      <option>Spray</option>
      <option>Pattern</option>

      <option>hline</option>
      <option>vline</option>
      <option>square</option>
      <option>diamond</option>
      <option>texture</option>
    </select><br>

    <label for="drawing-line-width">Line width:</label>
    <span class="info">3</span><input type="range" value="3" min="0" max="150" id="drawing-line-width"><br>

    <label for="drawing-color">Line color:</label>
    <input type="color" value="#005E7A" id="drawing-color"><br>

    <label for="drawing-shadow-color">Shadow color:</label>
    <input type="color" value="#005E7A" id="drawing-shadow-color"><br>

    <label for="drawing-shadow-width">Shadow width:</label>
    <span class="info">0</span><input type="range" value="0" min="0" max="50" id="drawing-shadow-width"><br>

    <label for="drawing-shadow-offset">Shadow offset:</label>
    <span class="info">0</span><input type="range" value="0" min="0" max="50" id="drawing-shadow-offset"><br>
  </div>
  
</div>
</div>
</div>
<br />
<br />

    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('Service Worker registered'))
          .catch(() => console.log('Service Worker registration failed'));
      }
    </script>
  </body>
</html>
